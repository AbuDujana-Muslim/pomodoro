<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro MR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        :root {
            /* متغيرات الثيم الأساسية */
            --bg-main: #0c0d12;
            --bg-panel: #161821;
            --theme-color: #5ddc67; /* النيون الافتراضي */
            
            --text-light: #f0f0f0;
            --text-muted: #888c99;
            --border-color: #2a2d3d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg-main); color: var(--text-light); height: 100vh;
            display: flex; overflow: hidden; font-size: 14px; transition: background-color 0.5s;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .app-container { display: flex; width: 100%; height: 100%; padding: 15px; gap: 15px; }

        .panel {
            background-color: var(--bg-panel); border-radius: 20px; border: 1px solid var(--border-color);
            padding: 20px; display: flex; flex-direction: column; transition: background-color 0.5s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- Left Sidebar --- */
        .sidebar { width: 240px; justify-content: space-between; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 900; color: white; margin-bottom: 30px; letter-spacing: 1px; }
        .logo i { color: var(--theme-color); font-size: 24px; text-shadow: 0 0 10px var(--theme-color); transition: 0.3s; }
        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-menu li { padding: 12px 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: var(--text-muted); transition: 0.3s; font-weight: 500; }
        .nav-menu li:hover, .nav-menu li.active { background-color: color-mix(in srgb, var(--theme-color) 10%, transparent); color: white; }
        .nav-menu li.active { border-right: 4px solid var(--theme-color); }

        /* --- Main Content --- */
        .main-content { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1.2fr 0.8fr; gap: 15px; }

        /* Plant Area */
        .plant-view-card { grid-column: 1; grid-row: 1; position: relative; background: radial-gradient(circle at center, #1f2425 0%, var(--bg-panel) 70%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .speech-bubble { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; font-size: 13px; text-align: center; margin-bottom: 20px; backdrop-filter: blur(10px); transition: 0.3s; }
        .plant-emoji-container { font-size: 110px; filter: drop-shadow(0 0 25px color-mix(in srgb, var(--theme-color) 40%, transparent)); animation: breathe 3s infinite ease-in-out; transition: transform 0.5s ease, opacity 0.3s ease; user-select: none; }
        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }

        /* Timer Area */
        .timer-card { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .timer-circle {
            position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center;
            background: conic-gradient(var(--theme-color) 0%, #333 50%, var(--border-color) 50%);
            border-radius: 50%; margin-bottom: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); transition: background 0.3s;
        }
        .timer-circle.break-mode { background: conic-gradient(#4a90e2 0%, #333 50%, var(--border-color) 50%); }
        .timer-circle::before { content: ''; position: absolute; inset: 8px; background: var(--bg-panel); border-radius: 50%; transition: 0.5s; }
        .timer-display { position: relative; z-index: 1; text-align: center; }
        .time-text { font-size: 48px; font-weight: 900; letter-spacing: 2px; }
        .session-badge { background: color-mix(in srgb, var(--theme-color) 15%, transparent); color: var(--theme-color); padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-top: 5px; display: inline-block; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: 0.3s; }
        
        .timer-controls { display: flex; gap: 15px; align-items: center; }
        .btn-play { background: var(--theme-color); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px color-mix(in srgb, var(--theme-color) 50%, transparent); transition: 0.2s; }
        .btn-play:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--theme-color); }
        .btn-play:disabled { background: var(--border-color); color: #888; box-shadow: none; cursor: not-allowed; }
        .btn-icon { background: var(--border-color); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { background: #3a3d52; }

        /* Task Input Area */
        .level-card { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; justify-content: space-between; }
        .level-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .level-bar-bg { width: 100%; height: 6px; background: var(--border-color); border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        .level-bar-fill { height: 100%; width: 0%; background: var(--theme-color); box-shadow: 0 0 10px var(--theme-color); transition: width 0.5s ease, background 0.3s; }
        
        .task-input-container { display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; }
        .task-input-container input { background: rgba(0,0,0,0.3); border: 1px solid #333; color: white; padding: 8px; border-radius: 8px; font-size: 12px; outline: none; transition: 0.3s; }
        .task-input-container input:focus { border-color: var(--theme-color); }
        .row-inputs { display: flex; gap: 8px; }
        .row-inputs input { width: 50%; }
        .btn-add-task { background: transparent; border: 1px dashed var(--theme-color); color: var(--theme-color); padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-add-task:hover { background: var(--theme-color); color: black; }

        /* Tasks List Area */
        .tasks-card { grid-column: 2; grid-row: 2; overflow-y: auto; }
        .tasks-header { font-size: 14px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .task-list { list-style: none; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 8px; transition: 0.3s; border: 1px solid transparent; }
        .task-item.active { border-color: var(--theme-color); background: color-mix(in srgb, var(--theme-color) 5%, transparent); box-shadow: 0 0 10px color-mix(in srgb, var(--theme-color) 20%, transparent) inset;}
        .task-item.completed { opacity: 0.6; text-decoration: line-through; }
        
        /* Check Circle */
        .check-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; cursor: pointer; transition: 0.3s; }
        .check-circle:hover { border-color: var(--theme-color); }
        .task-item.completed .check-circle { background: var(--theme-color); border-color: var(--theme-color); color: #000; box-shadow: 0 0 8px var(--theme-color); }

        /* --- Right Sidebar (Expanded Panels) --- */
        .right-sidebar { width: 280px; gap: 15px; padding: 0; background: transparent; border: none; box-shadow: none; display: flex; flex-direction: column; }
        .mini-panel { background: var(--bg-panel); border-radius: 15px; border: 1px solid var(--border-color); padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: center; transition: 0.5s; }
        
        .theme-panel { font-size: 12px; }
        .color-options { display: flex; gap: 10px; margin: 15px 0 25px; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.2); }

        .bg-options { display: flex; gap: 8px; margin-top: 15px; }
        .bg-box { width: 50px; height: 35px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .bg-box.active { border-color: var(--theme-color); }

        .stats-list { list-style: none; font-size: 13px; margin-top: 15px; display: flex; flex-direction: column; gap: 18px; }
        .stats-list li { display: flex; justify-content: space-between; color: var(--text-muted); }
        .stats-list li span:last-child { color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="panel sidebar">
            <div>
                <div class="logo"><i class="fa-solid fa-leaf"></i> POMODORO MR</div>
                <ul class="nav-menu">
                    <li class="active"><i class="fa-regular fa-clock"></i> الوقت</li>
                </ul>
            </div>
            </aside>

        <main class="main-content">
            
            <div class="panel plant-view-card">
                <div class="speech-bubble" id="plantSpeech">أهلاً بك يا بطل! لنبدأ جلسة تركيز قوية 🌿</div>
                <div id="mainPlantDisplay" class="plant-emoji-container">🌱</div>
            </div>

            <div class="panel timer-card">
                <div class="timer-circle" id="timerRing">
                    <div class="timer-display">
                        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;" id="timerLabel">وقت التركيز</div>
                        <div class="time-text" id="timerDisplay">00:00</div>
                        <div class="session-badge" id="sessionCounter">في انتظار المهام... 📭</div>
                    </div>
                </div>
                
                <div class="timer-controls">
                    <button class="btn-icon" onclick="skipRound()" title="تخطي"><i class="fa-solid fa-forward-step"></i></button>
                    <button class="btn-play" id="startBtn" onclick="toggleTimer()" disabled>ابدأ ▶</button>
                    <button class="btn-icon" onclick="resetTimer()" title="إعادة ضبط"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
            </div>

            <div class="panel level-card">
                <div>
                    <div class="level-header">
                        <span style="font-weight: bold; font-size: 16px;" id="plantLevelDisplay">Lv. 1</span>
                        <span>الخبرة <span style="color: var(--text-muted);" id="xpDisplay">0 / 1000 XP</span></span>
                    </div>
                    <div class="level-bar-bg"><div class="level-bar-fill" id="xpBar"></div></div>
                </div>

                <div class="task-input-container">
                    <input type="text" id="taskNameInput" placeholder="اسم المهمة (مثال: فيزياء، برمجة)...">
                    <div class="row-inputs">
                        <input type="number" id="taskMinInput" placeholder="وقت الجلسة (دقائق)">
                        <input type="number" id="taskRoundsInput" placeholder="عدد الجولات">
                    </div>
                    <button class="btn-add-task" onclick="addNewTask()">إضافة المهمة ➕</button>
                </div>
            </div>

            <div class="panel tasks-card">
                <div class="tasks-header">
                    <span>مهام اليوم</span>
                    <span id="totalTasksCount" style="font-size: 11px; color: var(--text-muted);">0 مهام</span>
                </div>
                <ul class="task-list" id="mainTaskList"></ul>
            </div>

        </main>

        <aside class="right-sidebar">
            <div class="mini-panel theme-panel">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                    <span>تخصيص المظهر</span> <i class="fa-solid fa-palette"></i>
                </div>
                
                <div style="margin-top: 20px; color: var(--text-muted);">الألوان الأساسية</div>
                <div class="color-options" id="colorPicker">
                    <div class="color-dot" style="background: #f5a623;" onclick="setThemeColor('#f5a623', this)"></div>
                    <div class="color-dot" style="background: #ff2a6d;" onclick="setThemeColor('#ff2a6d', this)"></div>
                    <div class="color-dot" style="background: #bd10e0;" onclick="setThemeColor('#bd10e0', this)"></div>
                    <div class="color-dot" style="background: #4a90e2;" onclick="setThemeColor('#4a90e2', this)"></div>
                    <div class="color-dot active" style="background: #5ddc67;" onclick="setThemeColor('#5ddc67', this)"></div>
                </div>

                <div style="color: var(--text-muted);">الخلفية</div>
                <div class="bg-options" id="bgPicker">
                    <div class="bg-box" style="background: #2a2d3d;" onclick="setThemeBg('#1e2029', '#2a2d3d', this)"></div>
                    <div class="bg-box" style="background: #111;" onclick="setThemeBg('#000', '#111', this)"></div>
                    <div class="bg-box active" style="background: #161821;" onclick="setThemeBg('#0c0d12', '#161821', this)"></div>
                </div>
            </div>

            <div class="mini-panel">
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                    <span>إحصائيات اليوم</span> <i class="fa-solid fa-chart-pie"></i>
                </div>
                <ul class="stats-list">
                    <li><span><i class="fa-regular fa-clock"></i> الجولات</span> <span id="statRounds">0</span></li>
                    <li><span><i class="fa-solid fa-list-check"></i> المهام</span> <span id="statTasks">0</span></li>
                    <li><span><i class="fa-solid fa-fire"></i> التركيز</span> <span style="color: var(--theme-color);" id="statFocus">جاهز!</span></li>
                    <li><span><i class="fa-solid fa-leaf"></i> النبتة</span> <span id="statPlant">Lv. 1</span></li>
                </ul>
            </div>
        </aside>

    </div>

    <script>
        // --- إعدادات النظام وتخصيص المظهر ---
        function setThemeColor(color, el) {
            document.documentElement.style.setProperty('--theme-color', color);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function setThemeBg(mainBg, panelBg, el) {
            document.documentElement.style.setProperty('--bg-main', mainBg);
            document.documentElement.style.setProperty('--bg-panel', panelBg);
            document.querySelectorAll('.bg-box').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        // --- مولد الصوت النقي (جرس هادئ) ---
        let audioCtx;
        function playSoftBell() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
            
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 3);
        }

        // --- متغيرات المهام والمؤقت ---
        let tasks = [];
        let currentTaskIndex = -1;
        let currentRound = 1;
        let timeLeft = 0;
        let timerId = null;
        let isRunning = false;
        let isBreakTime = false; 
        
        const display = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const sessionCounter = document.getElementById('sessionCounter');
        const timerRing = document.getElementById('timerRing');
        const timerLabel = document.getElementById('timerLabel');

        function updateDisplay() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            display.textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }

        function addNewTask() {
            let name = document.getElementById('taskNameInput').value;
            let mins = parseInt(document.getElementById('taskMinInput').value);
            let rounds = parseInt(document.getElementById('taskRoundsInput').value);

            if (!name || isNaN(mins) || isNaN(rounds) || mins <= 0 || rounds <= 0) return;

            tasks.push({ name, minutes: mins, rounds: rounds, completed: false });
            document.getElementById('totalTasksCount').innerText = `${tasks.length} مهام`;
            
            document.getElementById('taskNameInput').value = '';
            document.getElementById('taskMinInput').value = '';
            document.getElementById('taskRoundsInput').value = '';

            renderTasks();
            if (tasks.length === 1 && currentTaskIndex === -1) loadTask(0);
        }

        function renderTasks() {
            let list = document.getElementById('mainTaskList');
            list.innerHTML = '';
            tasks.forEach((t, i) => {
                let statusClass = t.completed ? 'completed' : (i === currentTaskIndex ? 'active' : '');
                let icon = t.completed ? '<i class="fa-solid fa-check"></i>' : '';
                
                list.innerHTML += `
                    <li class="task-item ${statusClass}">
                        <div style="display: flex; gap: 10px; align-items: center; width: 100%; justify-content: space-between;">
                            <div>
                                <div style="font-weight: bold; margin-bottom: 4px;">${t.name}</div>
                                <div style="font-size: 11px; color: var(--text-muted);">${t.minutes} د | ${t.rounds} جولات</div>
                            </div>
                            <div class="check-circle" onclick="toggleTaskCompletion(${i})">${icon}</div>
                        </div>
                    </li>
                `;
            });
        }

        function toggleTaskCompletion(index) {
            tasks[index].completed = !tasks[index].completed;
            if(tasks[index].completed && index === currentTaskIndex) {
                skipRound(); 
            }
            renderTasks();
        }

        function loadTask(index) {
            if (index < tasks.length) {
                currentTaskIndex = index;
                currentRound = 1;
                isBreakTime = false;
                timerRing.classList.remove('break-mode');
                timerLabel.innerText = "وقت التركيز";
                
                let task = tasks[index];
                if(task.completed) { loadTask(index + 1); return; } 

                timeLeft = task.minutes * 60;
                sessionCounter.innerText = `⏳ ${task.name} (جولة ${currentRound}/${task.rounds})`;
                startBtn.disabled = false;
                document.getElementById('plantSpeech').innerText = "ركز الآن، سنرتاح لاحقاً! 🎯";
            } else {
                currentTaskIndex = -1;
                timeLeft = 0;
                sessionCounter.innerText = "أنهيت جميع المهام! 🏆";
                startBtn.disabled = true;
                timerLabel.innerText = "انتهى اليوم";
                document.getElementById('plantSpeech').innerText = "عمل رائع! لقد أنجزت كل شيء اليوم 🌟";
            }
            updateDisplay();
            renderTasks();
        }

        function toggleTimer() {
            if (currentTaskIndex === -1) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (isRunning) {
                clearInterval(timerId);
                startBtn.innerHTML = 'استئناف ▶';
                isRunning = false;
            } else {
                startBtn.innerHTML = 'إيقاف ⏸';
                isRunning = true;
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        isRunning = false;
                        startBtn.innerHTML = 'متابعة ▶';
                        handleTimerEnd();
                    }
                }, 1000);
            }
        }

        function skipRound() {
            if (isRunning) toggleTimer();
            if (currentTaskIndex !== -1) handleTimerEnd();
        }

        function resetTimer() {
            if (currentTaskIndex !== -1) {
                if (isRunning) toggleTimer();
                let task = tasks[currentTaskIndex];
                timeLeft = isBreakTime ? Math.ceil(task.minutes * 0.2) * 60 : task.minutes * 60;
                updateDisplay();
            }
        }

        function handleTimerEnd() {
            playSoftBell(); 
            let task = tasks[currentTaskIndex];

            if (!isBreakTime) {
                document.getElementById('statRounds').innerText = parseInt(document.getElementById('statRounds').innerText) + 1;
                gainXP();

                if (currentRound < task.rounds) {
                    isBreakTime = true;
                    let breakMins = Math.ceil(task.minutes * 0.2); 
                    timeLeft = breakMins * 60;
                    
                    timerRing.classList.add('break-mode');
                    timerLabel.innerText = "وقت الاستراحة";
                    sessionCounter.innerText = `☕ استراحة (${breakMins} دقائق)`;
                    document.getElementById('plantSpeech').innerText = "استرخِ قليلاً، خذ نفساً عميقاً 😌";
                } else {
                    task.completed = true;
                    document.getElementById('statTasks').innerText = parseInt(document.getElementById('statTasks').innerText) + 1;
                    renderTasks();
                    loadTask(currentTaskIndex + 1);
                    return;
                }
            } else {
                isBreakTime = false;
                currentRound++;
                timeLeft = task.minutes * 60;
                
                timerRing.classList.remove('break-mode');
                timerLabel.innerText = "وقت التركيز";
                sessionCounter.innerText = `⏳ ${task.name} (جولة ${currentRound}/${task.rounds})`;
                document.getElementById('plantSpeech').innerText = "عدنا للعمل! 💪";
            }
            
            updateDisplay();
        }

        function gainXP() {
            let xpBar = document.getElementById('xpBar');
            let currentWidth = parseFloat(xpBar.style.width) || 0;
            currentWidth += 25; 
            if (currentWidth >= 100) {
                currentWidth = 0;
                let lvl = parseInt(document.getElementById('statPlant').innerText.replace('Lv. ', '')) + 1;
                document.getElementById('plantLevelDisplay').innerText = `Lv. ${lvl}`;
                document.getElementById('statPlant').innerText = `Lv. ${lvl}`;
            }
            xpBar.style.width = `${currentWidth}%`;
            document.getElementById('xpDisplay').innerText = `${currentWidth * 10} / 1000 XP`;
        }
    </script>
</body>
</html>
