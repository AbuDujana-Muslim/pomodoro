<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro MR | CYBER FOCUS X</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050712;
  --card:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.1);
  --text:#EAF2FF;

  --blue:#00E5FF;
  --purple:#9D4EDD;
  --gold:#FFCC00;
  --red:#FF3B5C;
  --green:#3CFF91;
}

*{box-sizing:border-box;font-family:Tajawal}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#0C1020,#050712 60%);
  color:var(--text);
  overflow-x:hidden;
}

/* animated background */
.bg{
  position:fixed;
  inset:-30%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.20), transparent 40%),
    radial-gradient(circle at 70% 30%, rgba(157,78,221,.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(60,255,145,.12), transparent 50%);
  filter:blur(70px);
  animation:move 10s ease-in-out infinite alternate;
}

@keyframes move{
  from{transform:scale(1) translate(0,0)}
  to{transform:scale(1.2) translate(30px,40px)}
}

/* header */
header{
  text-align:center;
  padding:20px;
}

.logo{
  font-size:3rem;
  font-weight:900;
  background:linear-gradient(90deg,var(--blue),var(--purple),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* layout */
.container{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:15px;
  padding:10px;
}

/* glass */
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:16px;
  backdrop-filter:blur(25px);
  box-shadow:0 0 60px rgba(0,0,0,.6);
}

/* TIMER */
.timer{
  font-size:5rem;
  font-weight:900;
  text-align:center;
  color:var(--blue);
  text-shadow:0 0 25px rgba(0,229,255,.4);
}

/* progress bar */
.bar{
  height:8px;
  background:#0f172a;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  transition:.3s;
}

/* inputs */
.row{
  display:grid;
  grid-template-columns:2fr 1fr 1fr auto;
  gap:6px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:#0b1020;
  color:#fff;
}

/* buttons */
button{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--blue);
  background:transparent;
  color:var(--blue);
  cursor:pointer;
  font-weight:700;
}

button:hover{
  background:var(--blue);
  color:#000;
}

/* task table */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:6px;
  background:#0b1020;
  border-left:3px solid var(--purple);
  border-radius:10px;
}

/* stats */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.stat{
  background:#0b1020;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* motivation */
.motivation{
  text-align:center;
  margin-top:10px;
  color:var(--gold);
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
  <div class="logo">Pomodoro MR // CYBER EDITION</div>
</header>

<div class="container">

<!-- LEFT -->
<div class="card">

<div class="timer" id="timer">25:00</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<div style="display:flex;gap:10px;margin-top:10px">
<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">RESET</button>
</div>

<div class="motivation" id="motivation">Focus is your real power</div>

<div class="stats">
  <div class="stat">Sessions<br><b id="sessions">0</b></div>
  <div class="stat">Hours<br><b id="hours">0</b></div>
</div>

</div>

<!-- RIGHT -->
<div class="card">

<h3>Task Engine</h3>

<div class="row">
<input id="t1" placeholder="Task">
<input id="t2" type="number" placeholder="min">
<input id="t3" type="number" placeholder="x">
<button onclick="add()">+</button>
</div>

<div id="list"></div>

</div>

</div>

<script>

let state={
  work:1500,
  break:300,
  long:900,
  time:1500,
  mode:"work",
  run:false,
  sessions:0,
  hours:0,
  cycles:0,
  tasks:[]
};

let t;

function tick(){

state.time--;

if(state.time<=0){

state.cycles++;

state.sessions++;

if(state.cycles%3===0){
state.time=state.long;
}else{
state.time=state.break;
}

beep();
}

state.hours+=0.00027;

render();
}

function start(){
if(state.run)return;
state.run=true;
t=setInterval(tick,1000);
}

function pause(){
clearInterval(t);
state.run=false;
}

function reset(){
clearInterval(t);
state.run=false;
state.time=state.work;
render();
}

function add(){
let v=document.getElementById("t1").value;
if(!v)return;
state.tasks.push(v);
document.getElementById("t1").value="";
render();
}

function beep(){
let a=new AudioContext();
let o=a.createOscillator();
o.connect(a.destination);
o.start();
o.stop(a.currentTime+0.15);
}

function render(){

let m=Math.floor(state.time/60);
let s=state.time%60;

document.getElementById("timer").innerText=
`${m}:${s.toString().padStart(2,"0")}`;

document.getElementById("sessions").innerText=state.sessions;
document.getElementById("hours").innerText=state.hours.toFixed(2);

document.getElementById("list").innerHTML=
state.tasks.map(t=>`<div class="task">${t}</div>`).join("");

let progress=((state.work-state.time)/state.work)*100;
document.getElementById("fill").style.width=progress+"%";

}

/* auto motivation */
setInterval(()=>{
let m=["You are building discipline","Focus wins everything","No distractions allowed","Execution > motivation"];
document.getElementById("motivation").innerText=
m[Math.floor(Math.random()*m.length)];
},5000);

render();

</script>

</body>
</html>
