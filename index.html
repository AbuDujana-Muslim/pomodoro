<div class="pomodoro-container">
    <div class="task-input">
        <input type="text" placeholder="ما هي مهمتك اليوم؟">
    </div>
    
    <div class="timer-display" id="timer">25:00</div>
    
    <div class="controls">
        <button onclick="changeTimerType('digital')">رقمي</button>
        <button onclick="changeTimerType('classic')">كلاسيكي</button>
    </div>
</div>

<style>
    :root {
        --neon-color: #00f2ff;
        --bg-color: #121212;
    }
    body { background: var(--bg-color); color: white; font-family: sans-serif; }
    
    .pomodoro-container {
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .task-input input, .timer-display {
        background: #1e1e1e;
        border: 2px solid transparent;
        box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        padding: 15px;
        margin: 10px;
        border-radius: 10px;
        transition: 0.3s;
    }

    /* تأثير النيون عند التفاعل */
    .task-input input:focus, .timer-display:hover {
        border-color: var(--neon-color);
        box-shadow: 0 0 20px var(--neon-color);
    }
</style>

<script>
    function changeTimerType(type) {
        const timer = document.getElementById('timer');
        if(type === 'classic') {
            timer.innerText = "00:25:00"; // تمثيل كلاسيكي
        } else {
            timer.innerText = "25:00";
        }
    }
</script>
