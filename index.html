<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Focus Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background-glow"></div>

<div class="container">

<!-- ===== HEADER ===== -->
<header class="hero">

<div>
<h1>🧠 Focus Mode</h1>
<p>التركيز الكامل بدون تشتيت</p>
</div>

<div class="daily-goal">
<span>جلسات اليوم</span>
<h2 id="sessionsCount">0</h2>
</div>

</header>

<div class="dashboard">

<!-- ===== TASKS ===== -->
<section class="card tasks-card">

<h2>📚 المهام</h2>

<div class="task-form">

<input id="taskName" type="text" placeholder="اسم المهمة">

<input id="focusTime" type="number" placeholder="مدة التركيز بالدقائق">

<button id="addTaskBtn">إضافة مهمة</button>

</div>

<div id="taskList" class="task-list"></div>

</section>

<!-- ===== TIMER ===== -->
<section class="card timer-card">

<h2>⏳ المؤقت</h2>

<div class="timer-wrapper">

<svg class="progress-ring" width="260" height="260">

<circle class="ring-bg" cx="130" cy="130" r="120"></circle>

<circle class="ring-progress" cx="130" cy="130" r="120"></circle>

</svg>

<div class="timer-content">

<div id="sessionType">جاهز</div>

<div id="timer">00:00</div>

<div id="taskCurrent">لا توجد مهمة</div>

</div>

</div>

<div class="controls">

<button id="startBtn">▶ تشغيل</button>
<button id="pauseBtn">⏸ إيقاف</button>
<button id="resetBtn">⏹ تصفير</button>
<button id="plusBtn">+ دقيقة</button>
<button id="nextBtn">⏭ التالي</button>

</div>

</section>

<!-- ===== MOTIVATION ===== -->
<section class="card motivation">

<h2>⚡ تحفيز</h2>

<div id="motivationText">
ابدأ الآن... خطوة واحدة تكفي.
</div>

</section>

<!-- ===== HISTORY ===== -->
<section class="card history-card">

<h2>📝 السجل</h2>

<div id="historyList">لا توجد جلسات بعد</div>

</section>

</div>

</div>

<!-- ===== SOUND ===== -->
<audio id="alarmSound" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/soft_bell_ring.ogg" type="audio/ogg">
</audio>

<script src="script.js"></script>

</body>
</html>
