<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنسيق الخانات المرنة</title>
    <style>
        /* إعدادات الصفحة العامة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* الحاوية الرئيسية (الأب) */
        .container {
            display: flex;
            flex-wrap: wrap;            /* يسمح بنزول الخانات للأسفل على الشاشات الصغيرة */
            justify-content: center;    /* يضمن بقاء الخانات في السنتر تماماً */
            gap: 20px;                  /* مسافة مرنة بين الخانتين */
            width: 100%;
            max-width: 1200px;          /* حد أقصى لعرض الحاوية على الشاشات الكبيرة جداً */
            margin: 0 auto;
            padding: 15px;
            box-sizing: border-box;
        }

        /* تنسيق الخانات (الأبناء) */
        .box {
            background-color: #ffffff;
            border-top: 5px solid #007bff; /* خط جمالي علوي */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 25px;
            text-align: center;
            
            /* السحر هنا لجعلها مرنة وتتمدد حسب حجم الشاشة */
            flex: 1 1 350px;            /* تنكمش حتى 350px وتتمدد لتملأ الشاشة الكبيرة بالتساوي */
            max-width: 100%;            /* حماية لمنع خروج الخانة عن حدود شاشات الهواتف الصغيرة */
            box-sizing: border-box;
            transition: transform 0.2s; /* حركة خفيفة عند تمرير الماوس */
        }

        /* تأثير بسيط عند تمرير الماوس فوق الخانة */
        .box:hover {
            transform: translateY(-5px);
        }

        /* تنسيق النصوص داخل الخانات */
        .box h3 {
            margin-top: 0;
            color: #333;
        }

        .box p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="box">
            <h3>الخانة الأولى 📱</h3>
            <p>هذه الخانة ستكون في السنتر دائماً. جرب تصغير شاشة المتصفح وستلاحظ كيف تتكيف وتتمدد بمرونة كاملة لتناسب شاشة هاتف أو حاسوب.</p>
        </div>

        <div class="box">
            <h3>الخانة الثانية 💻</h3>
            <p>عندما تكون الشاشة متسعة، ستجاور هذه الخانة أختها بالتساوي في المنتصف، وعند تصفحها من الهاتف ستنزل أسفلها بسلاسة ودون مشاكل.</p>
        </div>

    </div>

</body>
</html>
