<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Focus System</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05070b;
  --card:rgba(18,22,40,.6);
  --blue:#00e5ff;
  --purple:#9d4edd;
  --gold:#ffcc00;
  --red:#ff3355;
  --green:#39ff88;
  --text:#eaf2ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Tajawal}

body{
  background: radial-gradient(circle at top,#0d1020,#05070b);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

header h1{
  font-size:3rem;
  font-weight:900;
  background:linear-gradient(45deg,var(--blue),var(--purple),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-align:center;
  margin-bottom:10px;
}

.container{
  width:100%;
  max-width:950px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* CARDS */
.card{
  background:var(--card);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(12px);
}

/* TIMER */
.timer{
  font-size:4.5rem;
  font-weight:900;
  text-align:center;
  color:var(--blue);
  text-shadow:0 0 25px rgba(0,229,255,.4);
}

.mode{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.mode button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#111a30;
  color:white;
}

.mode .active{background:var(--blue);color:#000}

/* MOTIVATION */
.motivation{
  text-align:center;
  color:var(--gold);
  min-height:25px;
  transition:.3s;
}

/* TASKS */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:#0b0f1c;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.add{background:var(--green)}
.start{background:var(--blue)}
.reset{background:var(--red);color:white}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

th{color:var(--gold)}

.activeTask{
  background:rgba(0,229,255,.08);
}

footer{
  text-align:center;
  margin-top:15px;
  color:#aaa;
  font-size:.9rem;
}
</style>
</head>

<body>

<header>
  <h1>⚡ Neon Focus System</h1>
</header>

<div class="container">

  <!-- TIMER -->
  <div class="card">
    <div class="mode">
      <button onclick="setMode('work')" class="active" id="m1">عمل</button>
      <button onclick="setMode('short')" id="m2">راحة قصيرة</button>
      <button onclick="setMode('long')" id="m3">راحة طويلة</button>
    </div>

    <div class="timer" id="timer">25:00</div>

    <div class="motivation" id="motivation">ابدأ الآن… المستقبل يُبنى هنا</div>

    <div style="text-align:center;margin-top:10px;">
      <button class="start" onclick="toggle()">ابدأ / إيقاف</button>
      <button class="reset" onclick="reset()">إعادة</button>
    </div>
  </div>

  <!-- TASKS -->
  <div class="card">
    <div class="row">
      <input id="task" placeholder="المهمة">
      <input id="min" type="number" placeholder="الدقائق">
      <input id="rounds" type="number" placeholder="الجولات">
      <button class="add" onclick="add()">إضافة</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>المهمة</th>
          <th>دقائق</th>
          <th>جولات</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>

<footer>© 2026 Neon Focus | جميع الحقوق محفوظة</footer>

<script>
let modes = {
  work: 25*60,
  short: 5*60,
  long: 15*60
};

let mode = "work";
let time = modes[mode];
let running = false;
let interval;
let currentTask = -1;

const phrases = [
"ركز… أنت تصنع نسخة أقوى منك",
"كل ثانية = خطوة نحو القمة",
"لا تشتت… فقط تقدم",
"انضباطك هو سلاحك الحقيقي",
"النجاح لا ينتظر أحد"
];

function update(){
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText =
  `${m<10?"0":""}${m}:${s<10?"0":""}${s}`;
}

function setMode(m){
  mode = m;
  time = modes[m];
  update();

  document.querySelectorAll(".mode button")
  .forEach(b=>b.classList.remove("active"));

  if(m==="work") document.getElementById("m1").classList.add("active");
  if(m==="short") document.getElementById("m2").classList.add("active");
  if(m==="long") document.getElementById("m3").classList.add("active");
}

function toggle(){
  running = !running;

  if(running){
    interval = setInterval(()=>{
      time--;
      update();

      if(time<=0){
        clearInterval(interval);
        running=false;
        alert("انتهت الجلسة 🎉");

        if(mode==="work"){
          setMode("short");
        }
      }
    },1000);
  } else {
    clearInterval(interval);
  }
}

function reset(){
  clearInterval(interval);
  running=false;
  time=modes[mode];
  update();
}

function add(){
  let t=document.getElementById("task").value;
  let m=document.getElementById("min").value||25;
  let r=document.getElementById("rounds").value||1;

  if(!t) return;

  let row=document.createElement("tr");

  row.innerHTML=`
    <td>${t}</td>
    <td>${m}</td>
    <td>${r}</td>
    <td><button onclick="this.closest('tr').remove()">❌</button></td>
  `;

  document.getElementById("list").appendChild(row);

  document.getElementById("task").value="";
  document.getElementById("min").value="";
  document.getElementById("rounds").value="";
}

setInterval(()=>{
  document.getElementById("motivation").innerText =
  phrases[Math.floor(Math.random()*phrases.length)];
},7000);

update();
</script>

</body>
</html>
