<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro MR Lite</title>

<style>
body{
    margin:0;
    font-family:tajawal;
    background:linear-gradient(135deg,#05070b,#0f1123);
    color:white;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.panel{
    background:rgba(15,22,36,.75);
    padding:20px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    border:1px solid rgba(0,243,255,.15);
}

h1,h2{
    text-align:center;
    color:#ffb703;
}

.timer{
    font-size:60px;
    text-align:center;
    font-weight:bold;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.start{background:#00f3ff;color:#000;}
.reset{background:#ff1744;color:#fff;}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
    background:#111;
    color:white;
}

.task{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #222;
}

.motivation{
    text-align:center;
    color:#ffb703;
    font-weight:bold;
    min-height:30px;
}
</style>
</head>

<body>

<div class="container">

<h1>Pomodoro MR Lite ⏱️</h1>

<div class="panel">
    <h2 id="taskTitle">لا توجد مهمة</h2>
    <div class="timer" id="timer">25:00</div>

    <div class="motivation" id="motivation">ابدأ الآن، مستقبلك يُبنى هنا 🔥</div>

    <div class="controls">
        <button class="start" onclick="toggleTimer()">ابدأ / إيقاف</button>
        <button class="reset" onclick="resetTimer()">إعادة</button>
    </div>
</div>

<div class="panel">
    <h2>إضافة مهمة</h2>
    <input id="taskInput" placeholder="اسم المهمة">
    <input id="minutesInput" type="number" placeholder="عدد الدقائق (افتراضي 25)">
    <button class="start" onclick="addTask()">إضافة</button>

    <div id="tasks"></div>
</div>

</div>

<script>
let timer;
let running = false;
let timeLeft = 1500;
let currentTask = null;

const quotes = [
"ركز الآن، النجاح يبدأ من هنا 🔥",
"كل دقيقة تركيز تصنع فرقًا",
"لا تؤجل حلمك",
"أنت أقوى من المشتتات",
"استمر، أنت على الطريق الصحيح"
];

function updateDisplay(){
    let m = Math.floor(timeLeft/60);
    let s = timeLeft%60;
    document.getElementById("timer").innerText =
    `${m<10?"0":""}${m}:${s<10?"0":""}${s}`;
}

function toggleTimer(){
    if(running){
        clearInterval(timer);
        running = false;
        return;
    }

    running = true;

    timer = setInterval(()=>{
        timeLeft--;
        updateDisplay();

        if(timeLeft<=0){
            clearInterval(timer);
            running=false;
            alert("انتهت الجلسة 🎉");
        }
    },1000);
}

function resetTimer(){
    clearInterval(timer);
    running=false;
    timeLeft=1500;
    updateDisplay();
}

function addTask(){
    let name = document.getElementById("taskInput").value;
    let mins = parseInt(document.getElementById("minutesInput").value)||25;

    if(!name) return;

    let taskDiv = document.createElement("div");
    taskDiv.className="task";
    taskDiv.innerHTML=`
        <span>${name} (${mins}د)</span>
        <button onclick="selectTask(${mins}, '${name}', this)">اختيار</button>
    `;

    document.getElementById("tasks").appendChild(taskDiv);

    document.getElementById("taskInput").value="";
    document.getElementById("minutesInput").value="";
}

function selectTask(mins, name, btn){
    timeLeft = mins*60;
    currentTask = name;
    document.getElementById("taskTitle").innerText = name;
    updateDisplay();
}

function setMotivation(){
    let q = quotes[Math.floor(Math.random()*quotes.length)];
    document.getElementById("motivation").innerText = q;
}

setInterval(setMotivation, 8000);
updateDisplay();
</script>

</body>
</html>
