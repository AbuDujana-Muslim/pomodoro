<script type="module">
  // 1. استيراد الدوال الأساسية من Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  // 2. إعدادات تطبيق الويب الخاص بك
  const firebaseConfig = {
    apiKey: "AIzaSyCPPLBoiyecZqRSL7RgBCJ0fRYxemeuTEA",
    authDomain: "pomodoro-mr-ea408.firebaseapp.com",
    databaseURL: "https://pomodoro-mr-ea408-default-rtdb.firebaseio.com", // تأكد من وجود رابط قاعدة البيانات هنا
    projectId: "pomodoro-mr-ea408",
    storageBucket: "pomodoro-mr-ea408.firebasestorage.app",
    messagingSenderId: "777364680214",
    appId: "1:777364680214:web:5a5780639826d14c570f37"
  };

  // 3. تهيئة Firebase وقاعدة البيانات
  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // --- دوال التحكم بقاعدة البيانات ---

  // أ) دالة لإضافة مستخدم جديد عند الضغط على "بداية الرحلة"
  window.registerUserInCloud = function(userName) {
    if (!userName) return;
    
    set(ref(database, 'users/' + userName), {
      username: userName,
      hours: 0,
      badge: "الدرع المحصل"
    }).then(() => {
      console.log("تم حفظ المستخدم بنجاح في السحابة! 🎉");
    }).catch((error) => {
      console.error("خطأ أثناء الحفظ:", error);
    });
  };

  // ب) دالة لجلب البيانات وتحديث الجدول تلقائياً عند الجميع
  onValue(ref(database, 'users/'), (snapshot) => {
    const usersData = snapshot.val();
    if (!usersData) return;

    // ⚠️ استبدل 'rankingTableBody' بالـ id الفعلي لـ `<tbody>` الخاص بجدول الترتيب عندك
    const tableBody = document.getElementById('rankingTableBody'); 
    if (tableBody) {
      tableBody.innerHTML = ''; // تفريغ الجدول القديم

      // ترتيب المستخدمين من الأكثر ساعات إلى الأقل
      let sortedUsers = Object.values(usersData).sort((a, b) => b.hours - a.hours);

      // بناء صفوف الجدول من جديد
      sortedUsers.forEach((user, index) => {
        tableBody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${user.username}</td>
            <td>${user.hours} ساعة</td>
            <td>${user.badge}</td>
          </tr>
        `;
      });
    }
  });
</script>
