<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro MR</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070A12;
  --card:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.1);
  --text:#EAF2FF;

  --blue:#00E5FF;
  --purple:#9D4EDD;
  --gold:#FFCC00;
  --red:#FF3B5C;
  --green:#3CFF91;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Tajawal}

body{
  background:
    radial-gradient(circle at top,#0C1020,#070A12 60%);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* HEADER */
header{
  text-align:center;
  margin-bottom:10px;
}

.logo{
  font-size:3.2rem;
  font-weight:900;
  letter-spacing:1px;
  background:linear-gradient(45deg,var(--blue),var(--purple),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(0,229,255,.15);
}

.subtitle{
  font-size:.9rem;
  color:#9fb3c8;
}

/* LAYOUT */
.container{
  width:100%;
  max-width:980px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* GLASS CARD */
.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(18px);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
}

/* TIMER */
.timer{
  font-size:4.8rem;
  font-weight:900;
  text-align:center;
  color:var(--blue);
  text-shadow:0 0 25px rgba(0,229,255,.35);
}

.mode{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px 0;
}

.mode button{
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.03);
  color:var(--text);
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.mode .active{
  background:linear-gradient(45deg,var(--blue),var(--purple));
  border:none;
  color:#000;
  font-weight:700;
}

/* MOTIVATION */
.motivation{
  text-align:center;
  color:var(--gold);
  min-height:25px;
  transition:.3s;
  font-weight:700;
}

/* INPUT ROW */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input{
  flex:1;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--stroke);
  background:#0B1020;
  color:var(--text);
  outline:none;
}

button{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}

.add{background:var(--green)}
.start{background:var(--blue)}
.reset{background:var(--red);color:white}

button:hover{transform:scale(1.05)}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}

th{
  color:var(--gold);
  font-weight:900;
}

tr:hover{
  background:rgba(255,255,255,.03);
}

/* FOOTER */
footer{
  margin-top:15px;
  font-size:.85rem;
  color:#7f93ad;
  text-align:center;
  padding-top:10px;
  border-top:1px solid rgba(255,255,255,.08);
}
</style>
</head>

<body>

<header>
  <div class="logo">Pomodoro MR</div>
  <div class="subtitle">Focus • Discipline • Execution</div>
</header>

<div class="container">

  <!-- TIMER -->
  <div class="card">
    <div class="mode">
      <button class="active" onclick="setMode('work')" id="w">عمل</button>
      <button onclick="setMode('short')" id="s">راحة</button>
      <button onclick="setMode('long')" id="l">عميقة</button>
    </div>

    <div class="timer" id="timer">25:00</div>

    <div class="motivation" id="motivation">
      ركّز الآن… أنت تبني نسخة أقوى منك
    </div>

    <div style="text-align:center;margin-top:10px;">
      <button class="start" onclick="toggle()">ابدأ / إيقاف</button>
      <button class="reset" onclick="reset()">إعادة</button>
    </div>
  </div>

  <!-- TASKS -->
  <div class="card">
    <div class="row">
      <input id="task" placeholder="المهمة">
      <input id="min" type="number" placeholder="دقائق">
      <input id="rounds" type="number" placeholder="جولات">
      <button class="add" onclick="add()">إضافة</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>المهمة</th>
          <th>الدقائق</th>
          <th>الجولات</th>
          <th>حذف</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>

<footer>
© 2026 Pomodoro MR — Developed by Mahmod Rabaa
</footer>

<script>

let modes = { work:25*60, short:5*60, long:15*60 };
let mode="work";
let time=modes[mode];
let run=false;
let interval;

const quotes=[
"التركيز هو القوة الحقيقية",
"كل دقيقة تصنع فرقاً",
"النجاح يحتاج انضباط",
"لا مشتتات… فقط إنجاز",
"استمر… أنت تقترب"
];

function update(){
  let m=Math.floor(time/60);
  let s=time%60;
  document.getElementById("timer").innerText=
  `${m<10?"0":""}${m}:${s<10?"0":""}${s}`;
}

function setMode(m){
  mode=m;
  time=modes[m];
  update();

  document.querySelectorAll(".mode button")
  .forEach(b=>b.classList.remove("active"));

  if(m==="work")document.getElementById("w").classList.add("active");
  if(m==="short")document.getElementById("s").classList.add("active");
  if(m==="long")document.getElementById("l").classList.add("active");
}

function toggle(){
  run=!run;

  if(run){
    interval=setInterval(()=>{
      time--;
      update();

      if(time<=0){
        clearInterval(interval);
        run=false;
        alert("انتهت الجلسة 🎉");
        setMode("short");
      }
    },1000);
  }else clearInterval(interval);
}

function reset(){
  clearInterval(interval);
  run=false;
  time=modes[mode];
  update();
}

function add(){
  let t=document.getElementById("task").value;
  let m=document.getElementById("min").value||25;
  let r=document.getElementById("rounds").value||1;

  if(!t)return;

  let row=document.createElement("tr");
  row.innerHTML=`
    <td>${t}</td>
    <td>${m}</td>
    <td>${r}</td>
    <td><button onclick="this.closest('tr').remove()">❌</button></td>
  `;

  document.getElementById("list").appendChild(row);

  document.getElementById("task").value="";
  document.getElementById("min").value="";
  document.getElementById("rounds").value="";
}

setInterval(()=>{
  document.getElementById("motivation").innerText=
  quotes[Math.floor(Math.random()*quotes.length)];
},6000);

update();

</script>

</body>
</html>
