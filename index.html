<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEURO FOCUS // 3000 UI</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050713;
  --panel:rgba(255,255,255,.05);
  --stroke:rgba(255,255,255,.1);
  --cyan:#00e5ff;
  --purple:#9d4edd;
  --pink:#ff2d75;
  --green:#3cff91;
  --gold:#ffcc00;
}

*{box-sizing:border-box;font-family:Tajawal}

body{
  margin:0;
  background:radial-gradient(circle at top,#0b1020,#050713 60%);
  color:#fff;
  overflow-x:hidden;
}

/* animated background */
.bg{
  position:fixed;
  inset:-50%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.18), transparent 40%),
    radial-gradient(circle at 70% 30%, rgba(157,78,221,.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,45,117,.12), transparent 50%);
  filter:blur(80px);
  animation:move 12s infinite alternate;
}
@keyframes move{
  from{transform:scale(1)}
  to{transform:scale(1.25) translate(40px,30px)}
}

/* LAYOUT */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:320px 1fr 320px;
  gap:15px;
}

/* PANELS */
.card{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:16px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,0,0,.5);
}

/* TIMER */
.timer{
  font-size:5rem;
  text-align:center;
  font-weight:900;
  color:var(--cyan);
  text-shadow:0 0 25px rgba(0,229,255,.4);
}

/* buttons */
button{
  padding:10px;
  border-radius:12px;
  border:1px solid var(--cyan);
  background:transparent;
  color:var(--cyan);
  cursor:pointer;
  font-weight:700;
  transition:.2s;
  margin-top:6px;
}
button:hover{
  background:var(--cyan);
  color:#000;
}

/* inputs */
input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:#0b1020;
  color:#fff;
}

/* TASKS */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:6px;
  background:#0b1020;
  border-left:3px solid var(--purple);
  border-radius:10px;
}

/* CHART */
canvas{
  width:100%;
  height:180px;
  background:#0b1020;
  border-radius:12px;
  margin-top:10px;
}

/* QUOTES */
.quote{
  text-align:center;
  color:var(--gold);
  min-height:30px;
  margin-top:10px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- TASKS -->
<div class="card">
<h3>لوحة المهام</h3>

<input id="name" placeholder="اسم المهمة">
<input id="mins" type="number" placeholder="الدقائق">
<input id="rounds" type="number" placeholder="الجولات">

<button onclick="addTask()">إضافة</button>

<div id="tasks"></div>
</div>

<!-- CENTER -->
<div class="card" style="text-align:center">

<div class="timer" id="time">25:00</div>

<button onclick="start()">ابدأ</button>
<button onclick="pause()">إيقاف</button>
<button onclick="reset()">إعادة</button>

<div class="quote" id="quote">الانضباط يصنع المعجزات</div>

<canvas id="chart"></canvas>

</div>

<!-- STATS -->
<div class="card">

<h3>محرك الإنتاجية</h3>

<div>الجلسات: <b id="sessions">0</b></div>
<div>ساعات: <b id="hours">0</b></div>
<div>الإنجاز: <b id="done">0</b></div>

<select id="mode" onchange="setMode()">
<option value="work">تركيز</option>
<option value="break">راحة</option>
<option value="long">راحة طويلة</option>
</select>

</div>

</div>

<script>

let state={
  work:1500,
  break:300,
  long:900,
  time:1500,
  mode:"work",
  run:false,
  sessions:0,
  hours:0,
  done:0,
  tasks:[],
  history:[]
};

let t;

/* TIMER ENGINE */
function tick(){
  state.time--;

  if(state.time<=0){
    state.sessions++;
    state.done++;

    if(state.sessions%3===0){
      state.time=state.long;
    }else{
      state.time=state.break;
    }

    beep();
  }

  state.hours+=0.00027;
  state.history.push(state.sessions);

  drawChart();
  render();
}

/* CONTROL */
function start(){
  if(state.run)return;
  state.run=true;
  t=setInterval(tick,1000);
}

function pause(){
  clearInterval(t);
  state.run=false;
}

function reset(){
  clearInterval(t);
  state.run=false;
  state.time=state.work;
  render();
}

/* TASKS */
function addTask(){
  let n=document.getElementById("name").value;
  if(!n)return;

  state.tasks.push(n);
  render();
}

/* MODE */
function setMode(){
  let v=document.getElementById("mode").value;

  state.mode=v;

  if(v==="work") state.time=state.work;
  if(v==="break") state.time=state.break;
  if(v==="long") state.time=state.long;

  render();
}

/* SOUND */
function beep(){
  let a=new AudioContext();
  let o=a.createOscillator();
  o.connect(a.destination);
  o.start();
  o.stop(a.currentTime+0.2);
}

/* CHART */
function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  c.width=300;
  c.height=180;

  ctx.clearRect(0,0,c.width,c.height);

  ctx.strokeStyle="#00e5ff";
  ctx.beginPath();

  let step=10;

  state.history.slice(-30).forEach((v,i)=>{
    let x=i*10;
    let y=180-v*2;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

/* RENDER */
function render(){

let m=Math.floor(state.time/60);
let s=state.time%60;

document.getElementById("time").innerText=
`${m}:${s.toString().padStart(2,"0")}`;

document.getElementById("sessions").innerText=state.sessions;
document.getElementById("hours").innerText=state.hours.toFixed(2);
document.getElementById("done").innerText=state.done;

document.getElementById("tasks").innerHTML=
state.tasks.map(t=>`
<div class="task">${t}</div>
`).join("");

}

/* MOTIVATION */
setInterval(()=>{
let q=[
"ركز… أنت تبني عقلك",
"الوقت سلاحك الوحيد",
"لا تشتت، فقط إنجاز",
"استمر حتى النهاية",
"النجاح عادة"
];
document.getElementById("quote").innerText=
q[Math.floor(Math.random()*q.length)];
},4000);

render();

</script>

</body>
</html>
