<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEURO FOCUS // Pomodoro OS</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05070f;
  --panel:rgba(255,255,255,.05);
  --stroke:rgba(255,255,255,.1);

  --cyan:#00e5ff;
  --purple:#9d4edd;
  --pink:#ff2d75;
  --green:#3cff91;
  --gold:#ffcc00;
}

*{box-sizing:border-box;font-family:Tajawal}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#0c1020,#05070f 60%);
  color:#fff;
  overflow-x:hidden;
}

/* animated background */
.bg{
  position:fixed;
  inset:-40%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.18), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(157,78,221,.18), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(255,45,117,.12), transparent 50%);
  filter:blur(70px);
  animation:move 12s infinite alternate ease-in-out;
}
@keyframes move{
  from{transform:scale(1)}
  to{transform:scale(1.25) translate(40px,20px)}
}

/* layout */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1.4fr 1fr;
  gap:15px;
}

/* glass card */
.card{
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:16px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 50px rgba(0,0,0,.5);
}

/* TIMER */
.timer{
  font-size:5rem;
  font-weight:900;
  text-align:center;
  color:var(--cyan);
  text-shadow:0 0 25px rgba(0,229,255,.4);
}

/* buttons */
button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--cyan);
  background:transparent;
  color:var(--cyan);
  cursor:pointer;
  font-weight:700;
  transition:.2s;
}
button:hover{
  background:var(--cyan);
  color:#000;
}

/* inputs */
input{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:#0b1020;
  color:#fff;
}

/* TASKS */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:6px;
  background:#0b1020;
  border-left:3px solid var(--purple);
  border-radius:10px;
}

/* stats */
.stat{
  background:#0b1020;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  text-align:center;
}

/* streak bar */
.bar{
  height:10px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}
.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  transition:.3s;
}

/* quote */
.quote{
  text-align:center;
  color:var(--gold);
  min-height:30px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- LEFT: TASKS -->
<div class="card">
<h3>المهام الذكية</h3>

<input id="name" placeholder="اسم المهمة">
<input id="mins" type="number" placeholder="الدقائق">
<input id="rounds" type="number" placeholder="الجولات">

<button onclick="addTask()">إضافة مهمة</button>

<div id="tasks"></div>
</div>

<!-- CENTER: TIMER -->
<div class="card" style="text-align:center">

<div class="timer" id="time">25:00</div>

<button onclick="start()">ابدأ</button>
<button onclick="pause()">إيقاف</button>
<button onclick="reset()">إعادة</button>

<div class="quote" id="quote">التركيز هو القوة الحقيقية</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<div class="stat">الجلسات: <b id="sessions">0</b></div>
<div class="stat">ساعات الإنجاز: <b id="hours">0</b></div>
<div class="stat">السلسلة اليومية: <b id="streak">0</b></div>

</div>

<!-- RIGHT: ENGINE -->
<div class="card">
<h3>محرك الإنتاجية</h3>

<div class="stat">مستوى التركيز: <b id="focus">100%</b></div>
<div class="stat">المهام المكتملة: <b id="done">0</b></div>

</div>

</div>

<script>

let state={
  work:1500,
  break:300,
  long:900,
  time:1500,
  run:false,
  cycles:0,
  sessions:0,
  hours:0,
  streak:0,
  done:0,
  tasks:[]
};

let t;

/* TIMER ENGINE (auto break system) */
function tick(){
  state.time--;

  if(state.time<=0){
    state.cycles++;
    state.sessions++;

    if(state.cycles%3===0){
      state.time=state.long;
      state.streak++;
    }else{
      state.time=state.break;
    }

    beep();
  }

  state.hours += 0.00027;
  render();
}

/* CONTROL */
function start(){
  if(state.run)return;
  state.run=true;
  t=setInterval(tick,1000);
}

function pause(){
  clearInterval(t);
  state.run=false;
}

function reset(){
  clearInterval(t);
  state.run=false;
  state.time=state.work;
  render();
}

/* TASKS (advanced structure) */
function addTask(){
  let n=document.getElementById("name").value;
  let m=document.getElementById("mins").value||25;
  let r=document.getElementById("rounds").value||1;

  if(!n)return;

  state.tasks.push({
    name:n,
    mins:m,
    rounds:r,
    done:0
  });

  render();
}

/* COMPLETE TASK */
function complete(i){
  state.tasks[i].done++;
  state.done++;
  render();
}

/* SOUND */
function beep(){
  let a=new AudioContext();
  let o=a.createOscillator();
  o.connect(a.destination);
  o.start();
  o.stop(a.currentTime+0.2);
}

/* MOTIVATION SYSTEM */
const quotes=[
"ركز الآن… المستقبل يُبنى هنا",
"كل دقيقة تصنع فرقاً",
"الانضباط أقوى من الدافع",
"أنت في سباق مع نفسك فقط",
"استمر حتى تصبح النسخة الأفضل"
];

/* RENDER */
function render(){

let m=Math.floor(state.time/60);
let s=state.time%60;

document.getElementById("time").innerText=
`${m}:${s.toString().padStart(2,"0")}`;

document.getElementById("sessions").innerText=state.sessions;
document.getElementById("hours").innerText=state.hours.toFixed(2);
document.getElementById("streak").innerText=state.streak;
document.getElementById("done").innerText=state.done;

/* tasks */
document.getElementById("tasks").innerHTML=
state.tasks.map((t,i)=>`
<div class="task">
<span>${t.name} (${t.done}/${t.rounds})</span>
<button onclick="complete(${i})">✔</button>
</div>
`).join("");

/* progress */
let p=((state.work-state.time)/state.work)*100;
document.getElementById("fill").style.width=p+"%";

/* focus estimate */
let focus=Math.max(50,100-Math.floor(state.cycles*2));
document.getElementById("focus").innerText=focus+"%";

}

/* rotate quotes */
setInterval(()=>{
document.getElementById("quote").innerText=
quotes[Math.floor(Math.random()*quotes.length)];
},4000);

render();

</script>

</body>
</html>
