<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro MR | FOCUS OS</title>

<style>
:root{
  --bg:#05060a;
  --a:#00e5ff;
  --b:#ff2d75;
  --c:#7c4dff;
  --glass:rgba(255,255,255,0.05);
}

*{box-sizing:border-box;font-family:system-ui}

body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#0b1020,#05060a);
  color:#fff;
}

/* background */
.bg{
  position:fixed;
  inset:-40%;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.25), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,45,117,.18), transparent 45%),
    radial-gradient(circle at 50% 70%, rgba(124,77,255,.15), transparent 50%);
  filter:blur(80px);
}

/* layout */
.app{
  position:relative;
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1.3fr;
  gap:15px;
}

/* card */
.card{
  background:var(--glass);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:16px;
  backdrop-filter:blur(25px);
}

/* timer */
.timer{
  font-size:5rem;
  text-align:center;
  font-weight:900;
  color:var(--a);
}

/* inputs */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:6px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid #222;
  background:#0b1020;
  color:#fff;
}

/* buttons */
button{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--a);
  background:transparent;
  color:var(--a);
  cursor:pointer;
}

button:hover{
  background:var(--a);
  color:#000;
}

/* task */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:6px;
  background:#0b1020;
  border-left:3px solid var(--b);
  border-radius:10px;
}

/* progress */
.bar{
  height:6px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  margin-top:10px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--a),var(--c));
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- LEFT -->
<div class="card">
<h3>FOCUS ENGINE</h3>

<div class="timer" id="time">25:00</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<button onclick="start()">START</button>
<button onclick="pause()">PAUSE</button>
<button onclick="reset()">RESET</button>

<div id="mode">WORK</div>
<div id="stats"></div>
</div>

<!-- RIGHT -->
<div class="card">

<h3>TASK SYSTEM</h3>

<div class="grid">
<input id="name" placeholder="task">
<input id="mins" type="number" placeholder="min">
<input id="rounds" type="number" placeholder="x">
</div>

<button onclick="add()">ADD</button>

<div id="list"></div>

</div>

</div>

<script>

let state={
  mode:"work",
  work:1500,
  break:300,
  long:900,
  time:1500,
  running:false,
  cycles:0,
  sessions:0,
  start:null,
  tasks:JSON.parse(localStorage.getItem("tasks")||"[]"),
  completedMinutes:0
};

function format(t){
let m=Math.floor(t/60);
let s=t%60;
return `${m}:${s.toString().padStart(2,'0')}`;
}

/* REAL TIMER (NO DRIFT) */
function tick(){
if(!state.running) return;

let now=Date.now();
let diff=Math.floor((now-state.start)/1000);

let total=
state.mode==="work"?state.work:
state.mode==="break"?state.break:state.long;

state.time = total - diff;

if(state.time<=0){
switchMode();
notify();
}

render();
requestAnimationFrame(tick);
}

function switchMode(){

if(state.mode==="work"){
state.sessions++;
state.completedMinutes+=25;
state.cycles++;

if(state.cycles%3===0){
state.mode="long";
state.time=state.long;
}else{
state.mode="break";
state.time=state.break;
}
}else{
state.mode="work";
state.time=state.work;
}

state.start=Date.now();
save();
}

/* CONTROL */
function start(){
state.running=true;
state.start=Date.now()-( (state.work-state.time)*1000 );
requestAnimationFrame(tick);
}

function pause(){
state.running=false;
}

function reset(){
state.running=false;
state.mode="work";
state.time=state.work;
render();
}

/* TASKS */
function add(){
let n=document.getElementById("name").value;
let m=document.getElementById("mins").value;
let r=document.getElementById("rounds").value;

if(!n) return;

state.tasks.push({n,m,r});
save();
render();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(state.tasks));
}

/* NOTIFY */
function notify(){
try{
navigator.vibrate?.(200);
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
Notification.requestPermission().then(p=>{
if(p==="granted"){
new Notification("Session Complete 🔥");
}
});
}catch(e){}
}

/* RENDER */
function render(){

document.getElementById("time").innerText=format(Math.max(0,state.time));

document.getElementById("mode").innerText=state.mode.toUpperCase();

document.getElementById("stats").innerText=
`Sessions: ${state.sessions} | Focus min: ${state.completedMinutes}`;

let total=state.mode==="work"?state.work:
state.mode==="break"?state.break:state.long;

let progress=((total-state.time)/total)*100;
document.getElementById("fill").style.width=progress+"%";

document.getElementById("list").innerHTML=
state.tasks.map(t=>`
<div class="task">
<span>${t.n}</span>
<span>${t.m}m × ${t.r}</span>
</div>
`).join("");
}

render();

</script>

</body>
</html>
