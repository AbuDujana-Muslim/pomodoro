<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤقت التركيز الأكاديمي ⏱️</title>
    <style>
        /* سمة المكتبة الأكاديمية الدافئة - Warm Academic Study */
        :root {
            --bg-color: #1a120b; /* بني خشبي داكن جداً مريح للعين */
            --panel-bg: #2c1e11; /* لون ألواح خشبي متناسق */
            --text-main: #f5f2eb; /* أبيض عاجي مريح للقراءة */
            --text-muted: #bd9a7a; /* لون ورق عتيق ناعم */
            --accent-gold: #d4af37; /* لمسات ذهبية للأزرار الهامة */
            --accent-hover: #aa8c2c;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* اللوحات الأساسية */
        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(212, 175, 55, 0.1);
            text-align: center;
        }

        h1, h2, h3 {
            color: var(--accent-gold);
            margin-bottom: 15px;
        }

        /* لوحة تسجيل الدخول والملف الشخصي */
        .profile-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--text-muted);
            background: #110a05;
            color: var(--text-main);
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            background-color: var(--accent-gold);
            color: #1a120b;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .badge-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* مؤقت التركيز */
        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            color: var(--text-main);
            margin: 20px 0;
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* لوحة الصدارة المشتركة */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            text-align: right;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(189, 154, 122, 0.2);
        }

        .leaderboard-table th {
            color: var(--accent-gold);
        }

        .current-user-row {
            background-color: rgba(212, 175, 55, 0.15);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="panel profile-section" id="profilePanel">
        <div id="loginForm" class="input-group">
            <input type="text" id="usernameInput" placeholder="اكتب اسمك للانضمام للمكتبة..." />
            <button onclick="registerUser()">دخول</button>
        </div>
        <div id="userInfo" style="display: none; text-align: right;">
            <h3>مرحباً، <span id="displayUsername">المستخدم</span> 👋</h3>
            <p>مجموع ساعات التركيز: <span id="displayHours" style="color: var(--accent-gold);">0</span> ساعة</p>
        </div>
        <div class="badge-display" id="badgeDisplay">🛡️ لا يوجد درع حالياً</div>
    </div>

    <div class="panel">
        <h2>مؤقت التركيز الأكاديمي ⏱️</h2>
        <p style="color: var(--text-muted);">اضغط ابدأ واجمع الساعات لتطوير درعك ومنافسة زملائك</p>
        <div class="timer-display" id="timer">25:00</div>
        <div class="controls">
            <button onclick="toggleTimer()" id="startBtn">ابدأ التركيز 🚀</button>
            <button onclick="resetTimer()" style="background-color: #8b0000; color: white;">إعادة تعيين 🔄</button>
        </div>
    </div>

    <div class="panel">
        <h3>لوحة صدارة مجتمع التركيز 🏆</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px;">كن في الصدارة وأشعل الحماس في نفوس بقية زملائك في الدراسة!</p>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>المستحدم</th>
                    <th>مجموع الساعات</th>
                    <th>الدرع المستحق</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                </tbody>
        </table>
    </div>

</div>

<script>
    // الإعدادات الأساسية
    let timerInterval;
    let totalMinutesFocused = parseFloat(localStorage.getItem('totalMinutesFocused')) || 0;
    let currentUsername = localStorage.getItem('currentUsername') || '';
    let timeLeft = 25 * 60; // 25 دقيقة للتجربة السريعة (يمكنك تعديلها)
    let isRunning = false;

    // قائمة مستخدمين وهميين في لوحة الصدارة لمحاكاة "الشبكة المشتركة والتنافس"
    let mockUsers = [
        { username: "أحمد الملتزم", hours: 6.5, badge: "⚔️ الدرع الفضي" },
        { username: "سارة متفوقة", hours: 4.2, badge: "⚔️ الدرع الفضي" },
        { username: "خالد التكتيكي", hours: 2.1, badge: "🛡️ الدرع البرونزي" }
    ];

    // تشغيل التهيئة عند تحميل الصفحة
    window.onload = function() {
        if (currentUsername) {
            showProfile();
        }
        updateBadge();
        renderLeaderboard();
    };

    function registerUser() {
        const input = document.getElementById('usernameInput').value.trim();
        if (input) {
            currentUsername = input;
            localStorage.setItem('currentUsername', currentUsername);
            showProfile();
            renderLeaderboard();
        }
    }

    function showProfile() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('displayUsername').innerText = currentUsername;
        // عرض الساعات كعدد طبيعي مبسط
        document.getElementById('displayHours').innerText = Math.floor(totalMinutesFocused / 60);
    }

    // دالة تحديد نوع الدرع بناءً على شروطك الذكية
    function getBadge(hours) {
        if (hours >= 1 && hours < 3) return "🛡️ الدرع البرونزي";
        if (hours >= 3 && hours < 5) return "⚔️ الدرع الفضي";
        if (hours >= 5 && hours <= 8) return "👑 الدرع الذهبي";
        if (hours > 8) return "💎 درع الماس النادر";
        return "🌱 بداية الرحلة";
    }

    function updateBadge() {
        let currentHours = totalMinutesFocused / 60;
        let badge = getBadge(currentHours);
        document.getElementById('badgeDisplay').innerText = badge;
    }

    // تحديث وعرض لوحة الصدارة التنافسية
    function renderLeaderboard() {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = '';

        let currentHours = totalMinutesFocused / 60;
        let allUsers = [...mockUsers];

        if (currentUsername) {
            allUsers.push({
                username: currentUsername + " (أنت)",
                hours: parseFloat(currentHours.toFixed(1)),
                badge: getBadge(currentHours),
                isCurrent: true
            });
        }

        // ترتيب المستخدمين تنازلياً من الأعلى تركيزاً إلى الأقل
        allUsers.sort((a, b) => b.hours - a.hours);

        allUsers.forEach((user, index) => {
            const row = document.createElement('tr');
            if (user.isCurrent) row.className = 'current-user-row';

            row.innerHTML = `
                <td>${index + 1}</td>
                <td>${user.username}</td>
                <td>${Math.floor(user.hours)} ساعة</td>
                <td>${user.badge}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // إدارة العداد
    function toggleTimer() {
        if (isRunning) {
            clearInterval(timerInterval);
            document.getElementById('startBtn').innerText = 'استئناف التركيز 🚀';
            isRunning = false;
        } else {
            isRunning = true;
            document.getElementById('startBtn').innerText = 'إيقاف مؤقت ⏸️';
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // عند انتهاء الـ 25 دقيقة بنجاح، تُضاف دقائق التركيز تلقائياً
                    totalMinutesFocused += 25; 
                    localStorage.setItem('totalMinutesFocused', totalMinutesFocused);
                    
                    alert('أحسنت صنعاً يا بطل! تم إنهاء جلسة التركيز بنجاح وإضافة الإنجاز لقاعدة البيانات. 🎉');
                    
                    timeLeft = 25 * 60;
                    isRunning = false;
                    document.getElementById('startBtn').innerText = 'ابدأ التركيز 🚀';
                    
                    if (currentUsername) showProfile();
                    updateBadge();
                    renderLeaderboard();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timeLeft = 25 * 60;
        isRunning = false;
        document.getElementById('startBtn').innerText = 'ابدأ التركيز 🚀';
        updateTimerDisplay();
    }

    function updateTimerDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        document.getElementById('timer').innerText = 
            `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }
</script>
</body>
</html>
